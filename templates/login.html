<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — RecoAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0c0c1d;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-wrap {
      width: 100%;
      max-width: 420px;
    }
    .brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .brand-logo {
      font-family: 'Syne', sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      color: #f59e0b;
      margin-bottom: 6px;
    }
    .brand-logo span { color: #e2e2f0; }
    .brand-sub {
      font-size: 0.8rem;
      color: #6b6b9a;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .card {
      background: #13132a;
      border: 1px solid #252550;
      border-radius: 16px;
      padding: 36px;
    }
    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      color: #e2e2f0;
      margin-bottom: 4px;
    }
    .card-sub {
      font-size: 0.825rem;
      color: #6b6b9a;
      margin-bottom: 28px;
      line-height: 1.5;
    }
    .error-box {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 0.825rem;
      color: #fca5a5;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .form-group { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6b6b9a;
      margin-bottom: 7px;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      background: #0c0c1d;
      border: 1.5px solid #252550;
      border-radius: 10px;
      padding: 11px 14px;
      color: #e2e2f0;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #f59e0b; }
    input::placeholder { color: #3a3a5a; }
    .btn-login {
      width: 100%;
      background: #f59e0b;
      color: #0c0c1d;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-login:hover { background: #fbbf24; transform: translateY(-1px); }
    .btn-login:active { transform: translateY(0); }
    .hint {
      margin-top: 20px;
      text-align: center;
      font-size: 0.775rem;
      color: #3a3a5a;
    }
    .hint code {
      background: #0c0c1d;
      border: 1px solid #252550;
      padding: 1px 7px;
      border-radius: 4px;
      color: #f59e0b;
      font-size: 0.75rem;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      font-size: 0.8rem;
      color: #6b6b9a;
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: #f59e0b; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="brand">
      <div class="brand-logo">Reco<span>AI</span></div>
      <div class="brand-sub">Admin Panel</div>
    </div>
    <div class="card">
      <div class="card-title">Sign In</div>
      <div class="card-sub">Restricted access. Enter your admin credentials to continue.</div>

      {% if error %}
      <div class="error-box">⚠ {{ error }}</div>
      {% endif %}

      <form method="POST" action="/admin/login">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="admin" autocomplete="username" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn-login">Sign In →</button>
      </form>

      <div class="hint">Default: <code>admin</code> / <code>admin123</code></div>
    </div>
    <a href="/" class="back-link">← Back to Live Preview</a>
  </div>
</body>
</html>
